<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Camera Audio Synth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1e1e1e;
      --border: #3d3d3d;
      --text: #d4d4d4;
      --text-muted: #858585;
      --text-ln: #5a5a5a;
      --accent: #007acc;
      --green: #4ec9b0;
      --red: #f48771;
      --yellow: #dcdcaa;
      --scrollbar: #424242;
      --font: "Consolas", "JetBrains Mono", "Courier New", monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Titlebar ─────────────────────────── */
    .titlebar {
      height: 30px;
      min-height: 30px;
      flex-shrink: 0;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #1a1a1a;
    }
    .titlebar span {
      color: var(--text-muted);
      font-size: 12px;
      font-family: -apple-system, "Segoe UI", sans-serif;
      letter-spacing: 0.3px;
    }

    /* ── Main layout ──────────────────────── */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Panel header (reusable) ──────────── */
    .panel-header {
      height: 28px;
      min-height: 28px;
      flex-shrink: 0;
      background: #252526;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .panel-title {
      font-size: 11px;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 1px;
    }
    .panel-title-muted {
      font-size: 11px;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
    }

    /* ── Controls row ─────────────────────── */
    .controls-row {
      display: flex;
      flex-direction: row;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .control-block {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 16px;
      border-right: 1px solid var(--border);
    }
    .control-block:last-child {
      border-right: none;
    }

    .control-label {
      font-size: 11px;
      color: var(--text-muted);
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
      user-select: none;
    }

    /* Buttons */
    .btn {
      height: 22px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: -apple-system, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: #1a8ad4;
      border-color: #1a8ad4;
    }
    .btn-secondary {
      background: #3c3c3c;
      color: var(--text-muted);
      border-color: var(--border);
    }
    .btn-secondary:hover {
      background: #4a4a4a;
      color: var(--text);
    }

    /* Sliders */
    .slider {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #3c3c3c;
      border-radius: 2px;
      outline: none;
      width: 120px;
      border: 1px solid var(--border);
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: var(--accent);
      cursor: pointer;
      border: none;
    }
    .slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: var(--accent);
      cursor: pointer;
      border: none;
    }

    /* Value badge */
    .value-display {
      min-width: 52px;
      text-align: right;
      font-family: var(--font);
      font-size: 12px;
      color: var(--yellow);
      background: #2a2a2a;
      padding: 1px 5px;
      border-radius: 2px;
      border: 1px solid var(--border);
    }

    /* Select */
    .select {
      height: 22px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: #3c3c3c;
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }
    .select:focus {
      border-color: var(--accent);
    }
    .select option {
      background: #1e1e1e;
      color: var(--text);
    }

    /* Number input */
    .num-input {
      height: 22px;
      width: 70px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: #3c3c3c;
      color: var(--yellow);
      font-family: var(--font);
      font-size: 12px;
      outline: none;
      text-align: right;
      -moz-appearance: textfield;
    }
    .num-input::-webkit-inner-spin-button,
    .num-input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .num-input:focus {
      border-color: var(--accent);
    }

    /* ── Content area ─────────────────────── */
    .content-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Video panel ──────────────────────── */
    .video-panel {
      width: 340px;
      min-width: 340px;
      flex-shrink: 0;
      background: #252526;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .video-inner {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #1a1a1a;
    }
    #grayscaleCanvas {
      border: 1px solid var(--border);
      border-radius: 2px;
      image-rendering: pixelated;
      background: #000;
      display: block;
      width: 300px;
      height: 300px;
    }

    /* ── Waveform panel ───────────────────── */
    .waveform-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .waveform-inner {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
    }
    #waveformCanvas {
      display: block;
      width: 100%;
      max-width: 800px;
      height: 160px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    /* hidden elements */
    video, #canvas {
      display: none;
    }

    /* scrollbar global */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 5px; }

    @media (max-width: 700px) {
      .content-area { flex-direction: column; }
      .video-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); }
      .control-block { border-right: none; border-bottom: 1px solid var(--border); width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Titlebar -->
  <div class="titlebar">
    <span>camera-audio-synth.js — Camera Audio Synth</span>
  </div>

  <div class="workspace">

    <!-- Controls toolbar -->
    <div class="panel-header">
      <span class="panel-title">Controls</span>
    </div>
    <div class="controls-row">

      <!-- Start / Stop -->
      <div class="control-block">
        <button id="start" class="btn btn-primary">▶ Start</button>
        <button id="stop" class="btn btn-secondary">■ Stop</button>
      </div>

      <!-- Volume -->
      <div class="control-block">
        <label class="control-label">Volume</label>
        <input type="range" id="volumeControl" class="slider" min="0" max="1" step="0.01" value="0.005">
        <span id="volumeValue" class="value-display">0.005</span>
      </div>

      <!-- Grid Size -->
      <div class="control-block">
        <label class="control-label">Grid Size</label>
        <select id="sizeSelect" class="select">
          <option value="4">4×4 (16px)</option>
          <option value="8" selected>8×8 (64px)</option>
          <option value="16">16×16 (256px)</option>
          <option value="32">32×32 (1024px)</option>
        </select>
        <span id="pixelCount" class="value-display">64 px</span>
      </div>

      <!-- Freq Range -->
      <div class="control-block">
        <label class="control-label">Freq Range</label>
        <input type="number" id="minFreqInput" class="num-input" min="20" max="19999" step="1" value="50" title="Min Hz">
        <span class="control-label" style="font-size:10px; letter-spacing:0;">Hz –</span>
        <input type="number" id="maxFreqInput" class="num-input" min="21" max="20000" step="1" value="5000" title="Max Hz">
        <span class="control-label" style="font-size:10px; letter-spacing:0;">Hz</span>
      </div>

      <!-- Freq Distribution -->
      <div class="control-block">
        <label class="control-label">Distribution</label>
        <select id="distributionSelect" class="select">
          <option value="logarithmic" selected>Logarithmic</option>
          <option value="linear">Linear</option>
          <option value="exponential">Exponential</option>
          <option value="harmonic">Harmonic</option>
        </select>
      </div>

    </div>

    <!-- Main content -->
    <div class="content-area">

      <!-- Video feed panel -->
      <div class="video-panel">
        <div class="panel-header">
          <span class="panel-title-muted" id="videoTitle">OUTPUT — 8×8</span>
        </div>
        <div class="video-inner">
          <canvas id="grayscaleCanvas" width="320" height="320"></canvas>
        </div>
      </div>

      <!-- Waveform panel -->
      <div class="waveform-panel">
        <div class="panel-header">
          <span class="panel-title-muted">WAVEFORM</span>
        </div>
        <div class="waveform-inner">
          <canvas id="waveformCanvas" width="800" height="160"></canvas>
        </div>
      </div>

    </div>

    <!-- Status bar 
    <div class="statusbar">
      <div class="status-item">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Stopped</span>
      </div>
      <div class="status-item" id="status-item-freq-range">Freq: <span>—</span></div>
      <div class="status-item" id="status-item-freq-distribution">Mode: <span>Logarithmic</span></div>
      <div class="status-item">Curve: <span>Hilbert</span></div>
    </div>
    -->

  </div>

  <!-- Hidden elements -->
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="100" height="100"></canvas>

  <script>
    let size = 8;
    let numPixels = size * size;
    let numOscillators = size * size;

    let audioContext, workletNode;
    let video = document.getElementById('video');
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d', { willReadFrequently: true });
    let grayscaleCanvas = document.getElementById('grayscaleCanvas');
    let grayscaleCtx = grayscaleCanvas.getContext('2d');

    let animationId;
    let volumeMultiplier = 0.005;
    let frequencyDistribution = 'logarithmic';
    let minFreq = 50;
    let maxFreq = 5000;
    let currentFrequencies = [];
    let isRunning = false;
    let hilbertCoords = [];

    function hilbert(n, index) {
      let x = 0, y = 0;
      for (let s = 1, t = index; s < n; s *= 2) {
        let rx = 1 & (t >> 1);
        let ry = 1 & (t ^ rx);
        [x, y] = rot(s, x, y, rx, ry);
        x += s * rx;
        y += s * ry;
        t >>= 2;
      }
      return [x, y];
    }

    function rot(n, x, y, rx, ry) {
      if (ry === 0) {
        if (rx === 1) { x = n - 1 - x; y = n - 1 - y; }
        [x, y] = [y, x];
      }
      return [x, y];
    }

    function precomputeHilbertCurve(gridSize) {
      hilbertCoords = new Array(gridSize * gridSize);
      for (let i = 0; i < gridSize * gridSize; i++) {
        hilbertCoords[i] = hilbert(gridSize, i);
      }
    }

    function generateFrequencies(distribution, numOsc) {
      const frequencies = new Array(numOsc);
      switch (distribution) {
        case 'linear':
          for (let i = 0; i < numOsc; i++)
            frequencies[i] = minFreq + (i / (numOsc - 1)) * (maxFreq - minFreq);
          break;
        case 'exponential': {
          // steeper curve than log — square the normalised position
          for (let i = 0; i < numOsc; i++) {
            const t = Math.pow(i / (numOsc - 1), 2);
            frequencies[i] = minFreq + t * (maxFreq - minFreq);
          }
          break;
        }
        case 'harmonic': {
          // integer multiples of the min frequency, clamped to maxFreq
          const fundamental = minFreq;
          for (let i = 0; i < numOsc; i++) {
            const harmonic = fundamental * (i + 1);
            frequencies[i] = Math.min(harmonic, maxFreq);
          }
          break;
        }
        case 'logarithmic':
        default: {
          const logMin = Math.log(minFreq), logMax = Math.log(maxFreq);
          for (let i = 0; i < numOsc; i++) {
            const logValue = logMin + (i / (numOsc - 1)) * (logMax - logMin);
            frequencies[i] = Math.exp(logValue);
          }
          break;
        }
      }
      return frequencies;
    }

    function applyFrequencyChange() {
      updateUIforSettings();
      if (workletNode && isRunning) {
        const frequencies = generateFrequencies(frequencyDistribution, numOscillators);
        currentFrequencies = frequencies;
        workletNode.port.postMessage({ type: 'updateConfig', numOscillators, frequencies });
      }
    }

    function updateSize(newSize) {
      size = parseInt(newSize);
      numPixels = size * size;
      numOscillators = size * size;
      canvas.width = size;
      canvas.height = size;
      precomputeHilbertCurve(size);
      document.getElementById('pixelCount').textContent = numPixels + ' px';
      document.getElementById('videoTitle').textContent = `OUTPUT — ${size}×${size}`;
      applyFrequencyChange();
    }

    // Volume
    document.getElementById('volumeControl').oninput = function () {
      volumeMultiplier = parseFloat(this.value);
      document.getElementById('volumeValue').textContent = this.value;
    };

    // Grid size
    document.getElementById('sizeSelect').onchange = function () { updateSize(this.value); };

    // Freq range inputs
    function clampFreqInputs() {
      const minInput = document.getElementById('minFreqInput');
      const maxInput = document.getElementById('maxFreqInput');
      let newMin = parseInt(minInput.value) || 20;
      let newMax = parseInt(maxInput.value) || 20000;
      newMin = Math.max(20, Math.min(newMin, 19999));
      newMax = Math.max(newMin + 1, Math.min(newMax, 20000));
      minInput.value = newMin;
      maxInput.value = newMax;
      minFreq = newMin;
      maxFreq = newMax;
    }

    document.getElementById('minFreqInput').onchange = function () {
      clampFreqInputs();
      applyFrequencyChange();
    };
    document.getElementById('maxFreqInput').onchange = function () {
      clampFreqInputs();
      applyFrequencyChange();
    };

    // Distribution
    document.getElementById('distributionSelect').onchange = function () {
      frequencyDistribution = this.value;
      applyFrequencyChange();
    };

    async function setupAudio() {
      audioContext = new AudioContext();
      const frequencies = generateFrequencies(frequencyDistribution, numOscillators);
      currentFrequencies = frequencies;

      const workletCode = `
        class WideRangeSynthProcessor extends AudioWorkletProcessor {
          constructor() {
            super();
            this.numOscillators = 64;
            this.frequencies = new Array(this.numOscillators).fill(0).map((_, i) => {
              const logMin = Math.log(50), logMax = Math.log(10000);
              return Math.exp(logMin + (i / (this.numOscillators - 1)) * (logMax - logMin));
            });
            this.targetAmplitudes = new Float32Array(this.numOscillators).fill(0);
            this.currentAmplitudes = new Float32Array(this.numOscillators).fill(0);
            this.phases = new Float32Array(this.numOscillators);
            for (let i = 0; i < this.numOscillators; i++) this.phases[i] = Math.random() * 2 * Math.PI;
            this.phaseSteps = this.frequencies.map(f => 2 * Math.PI * f / sampleRate);
            this.masterGain = 0;
            this.port.onmessage = (event) => {
              if (event.data.type === 'amplitudes') {
                const pixelData = event.data.values;
                if (pixelData.length === this.numOscillators) {
                  for (let i = 0; i < this.numOscillators; i++) {
                    this.targetAmplitudes[i] = pixelData[i];
                    this.currentAmplitudes[i] = this.targetAmplitudes[i];
                  }
                } else {
                  const groupSize = Math.max(1, Math.floor(pixelData.length / this.numOscillators));
                  for (let i = 0; i < this.numOscillators; i++) {
                    let sum = 0;
                    const startIdx = i * groupSize;
                    const endIdx = Math.min(startIdx + groupSize, pixelData.length);
                    for (let j = startIdx; j < endIdx; j++) sum += pixelData[j];
                    this.targetAmplitudes[i] = sum / (endIdx - startIdx);
                    this.currentAmplitudes[i] = this.targetAmplitudes[i];
                  }
                }
                const totalEnergy = this.targetAmplitudes.reduce((a, b) => a + b * b, 0);
                this.masterGain = Math.sqrt(totalEnergy) * 0.08;
              } else if (event.data.type === 'updateConfig') {
                this.numOscillators = event.data.numOscillators;
                this.frequencies = [...event.data.frequencies];
                this.phaseSteps = this.frequencies.map(f => 2 * Math.PI * f / sampleRate);
                this.targetAmplitudes = new Float32Array(this.numOscillators).fill(0);
                this.currentAmplitudes = new Float32Array(this.numOscillators).fill(0);
                this.phases = new Float32Array(this.numOscillators);
                for (let i = 0; i < this.numOscillators; i++) this.phases[i] = Math.random() * 2 * Math.PI;
              }
            };
          }
          process(_, outputs) {
            const output = outputs[0][0];
            for (let i = 0; i < output.length; i++) {
              let sample = 0;
              for (let j = 0; j < this.numOscillators; j++) {
                this.phases[j] += this.phaseSteps[j];
                if (this.phases[j] > 6.28318530718) this.phases[j] -= 6.28318530718;
                if (this.currentAmplitudes[j] > 0.001) sample += this.currentAmplitudes[j] * Math.sin(this.phases[j]);
              }
              sample *= this.masterGain;
              if (sample > 0.7) sample = 0.7 + (sample - 0.7) * 0.05;
              else if (sample < -0.7) sample = -0.7 + (sample + 0.7) * 0.05;
              output[i] = sample;
            }
            return true;
          }
        }
        registerProcessor('wide-range-synth', WideRangeSynthProcessor);
      `;

      await audioContext.audioWorklet.addModule('data:application/javascript;base64,' + btoa(workletCode));
      workletNode = new AudioWorkletNode(audioContext, 'wide-range-synth');
      workletNode.connect(audioContext.destination);
      workletNode.port.postMessage({ type: 'updateConfig', numOscillators, frequencies });
    }

    let analyserNode;
    function setupWaveformVisualizer() {
      analyserNode = audioContext.createAnalyser();
      analyserNode.fftSize = 1024;
      workletNode.connect(analyserNode);

      const waveformCanvas = document.getElementById('waveformCanvas');
      const waveformCtx = waveformCanvas.getContext('2d');

      function drawWaveform() {
        requestAnimationFrame(drawWaveform);
        const bufferLength = analyserNode.fftSize;
        const dataArray = new Uint8Array(bufferLength);
        analyserNode.getByteTimeDomainData(dataArray);

        waveformCtx.clearRect(0, 0, waveformCanvas.width, waveformCanvas.height);

        waveformCtx.strokeStyle = '#2a2a2a';
        waveformCtx.lineWidth = 1;
        waveformCtx.beginPath();
        waveformCtx.moveTo(0, waveformCanvas.height / 2);
        waveformCtx.lineTo(waveformCanvas.width, waveformCanvas.height / 2);
        waveformCtx.stroke();

        waveformCtx.strokeStyle = '#4ec9b0';
        waveformCtx.lineWidth = 1.5;
        waveformCtx.beginPath();
        const sliceWidth = waveformCanvas.width / bufferLength;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
          const v = dataArray[i] / 128.0;
          const y = (v - 1.0) * waveformCanvas.height / 2 + waveformCanvas.height / 2;
          i === 0 ? waveformCtx.moveTo(x, y) : waveformCtx.lineTo(x, y);
          x += sliceWidth;
        }
        waveformCtx.stroke();
      }
      drawWaveform();
    }

    function processFrameAndSend() {
      ctx.drawImage(video, 0, 0, size, size);
      let imageData = ctx.getImageData(0, 0, size, size).data;
      const amplitudes = new Float32Array(numPixels);
      const grayscaleImageData = grayscaleCtx.createImageData(size, size);

      for (let i = 0; i < numPixels; i++) {
        const [x, y] = hilbertCoords[i];
        const index = (y * size + x) * 4;
        const r = imageData[index], g = imageData[index + 1], b = imageData[index + 2];
        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
        const normalizedGray = Math.pow(gray / 255, 1.5);
        amplitudes[i] = normalizedGray * volumeMultiplier;
        const displayIndex = (y * size + x) * 4;
        grayscaleImageData.data[displayIndex] = gray;
        grayscaleImageData.data[displayIndex + 1] = gray;
        grayscaleImageData.data[displayIndex + 2] = gray;
        grayscaleImageData.data[displayIndex + 3] = 255;
      }

      grayscaleCtx.putImageData(grayscaleImageData, 0, 0);
      grayscaleCtx.imageSmoothingEnabled = false;
      grayscaleCtx.drawImage(grayscaleCanvas, 0, 0, size, size, 0, 0, 320, 320);

      if (workletNode) workletNode.port.postMessage({ type: 'amplitudes', values: amplitudes });
      animationId = requestAnimationFrame(processFrameAndSend);
    }

    async function start() {
      try {
        clampFreqInputs();
        await setupAudio();
        setupWaveformVisualizer();
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        isRunning = true;
        document.getElementById('statusDot').classList.add('active');
        document.getElementById('statusText').textContent = 'Running';
        updateUIforSettings();
        video.onloadedmetadata = () => { video.play(); processFrameAndSend(); };
      } catch (error) {
        console.error('Error starting:', error);
        alert('Error starting: ' + error.message);
      }
    }

    function stop() {
      isRunning = false;
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
      cancelAnimationFrame(animationId);
      document.getElementById('statusDot').classList.remove('active');
      document.getElementById('statusText').textContent = 'Stopped';
    }

    precomputeHilbertCurve(size);
    document.getElementById('start').onclick = start;
    document.getElementById('stop').onclick = stop;
  </script>
</body>
</html>
