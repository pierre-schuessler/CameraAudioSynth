<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Camera Audio Synth</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <!-- Titlebar -->
  <div class="titlebar">
    <span>Camera Audio Synthesizer</span>
  </div>

  <div class="workspace">

    <!-- Controls toolbar -->
    <div class="controls-row">

      <!-- Start / Stop -->
      <div class="control-block">
        <button id="start-stop" class="btn btn-primary">▶ Start</button>
      </div>

      <!-- Volume -->
      <div class="control-block">
        <label class="control-label">Volume</label>
        <input type="range" id="volumeControl" class="slider" min="0" max="1" step="0.01" value="0.005">
        <span id="volumeValue" class="value-display">0.005</span>
      </div>

      <!-- Grid Size -->
      <div class="control-block">
        <label class="control-label">Grid Size</label>
        <select id="sizeSelect" class="select">
          <option value="4">4×4 (16px)</option>
          <option value="8" selected>8×8 (64px)</option>
          <option value="16">16×16 (256px)</option>
          <option value="32">32×32 (1024px)</option>
        </select>
        <span id="pixelCount" class="value-display">64 px</span>
      </div>

      <!-- Freq Range -->
      <div class="control-block">
        <label class="control-label">Freq Range</label>
        <input type="number" id="minFreqInput" class="num-input" min="20" max="19999" step="1" value="50" title="Min Hz">
        <span class="control-label" style="font-size:10px; letter-spacing:0;">Hz –</span>
        <input type="number" id="maxFreqInput" class="num-input" min="21" max="20000" step="1" value="5000" title="Max Hz">
        <span class="control-label" style="font-size:10px; letter-spacing:0;">Hz</span>
      </div>

      <!-- Freq Distribution -->
      <div class="control-block">
        <label class="control-label">Distribution</label>
        <select id="distributionSelect" class="select">
          <option value="logarithmic" selected>Logarithmic</option>
          <option value="linear">Linear</option>
          <option value="exponential">Exponential</option>
          <option value="harmonic">Harmonic</option>
        </select>
      </div>

    </div>

    <!-- Main content -->
    <div class="content-area">

      <!-- Video feed panel -->
      <div class="video-panel">
        <div class="panel-header">
          <span class="panel-title" id="videoTitle">OUTPUT — 8×8</span>
        </div>
        <div class="video-inner">
          <canvas id="grayscaleCanvas" width="320" height="320"></canvas>
        </div>
      </div>

      <!-- Waveform panel -->
      <div class="waveform-panel">
        <div class="panel-header">
          <span class="panel-title">WAVEFORM</span>
        </div>
        <div class="waveform-inner">
          <canvas id="waveformCanvas" width="800" height="160"></canvas>
        </div>
      </div>

    </div>
  </div>

  <!-- Hidden elements -->
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="100" height="100"></canvas>
</body>
</html>
